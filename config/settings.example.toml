# Пример основного конфигурационного файла swarm-режима.
# Этот файл описывает только несекретные настройки.
# Секреты вроде API_ID, API_HASH, GEMINI_API_KEY и SESSION_STRING_* нужно хранить в .env.

[app]
# Режим приложения.
# Сейчас проект работает только в режиме swarm.
# Пример: "swarm"
mode = "swarm"

[target]
# Числовой id целевой Telegram-группы.
# Обычно это id супергруппы в формате -100...
# Пример: -1001234567890
group_chat_id = -1001234567890

# Публичный username или ссылка-идентификатор той же группы.
# Нужен как дополнительный способ найти группу через Telegram.
# Пример: "@my_group"
group_target = "@my_group"

[storage]
# Путь к SQLite-файлу, где будет храниться история сообщений и scheduled exchange.
# Если папки не существует, приложение создаст её само.
# Пример: "data/history.db"
db_path = "data/history.db"

[prompts]
# Базовая директория с промтами.
# Внутри неё лежат system.md, reply.md, start_topic.md и другие markdown-файлы.
# Реальные *.md файлы локальные для каждого инстанса и не коммитятся.
# Для старта скопируйте *.example.md в такие же имена без .example.
# Пример: "ai/prompts"
base_dir = "ai/prompts"

# Путь к файлу со списком тем для плановых диалогов между ботами.
# Обычно это markdown-файл, где хранятся заготовки тем.
# Файл локальный для инстанса и не коммитится.
# Пример: "ai/prompts/topics.md"
topics_path = "ai/prompts/topics.md"

# Папка с persona-файлами конкретных ботов.
# Каждый bot из [[swarm.bots]] ссылается на файл из этой директории.
# Реальные persona-файлы локальные для инстанса и не коммитятся.
# Пример: "ai/prompts/bots"
bot_profiles_dir = "ai/prompts/bots"

[gemini]
# Основная модель Gemini для генерации ответов.
# Пример: "gemini-2.5-flash"
model = "gemini-2.5-flash"

# Резервная модель, на которую приложение может переключиться при проблемах с основной.
# Пример: "gemini-2.5-flash-lite"
fallback_model = "gemini-2.5-flash-lite"

# Базовая температура генерации.
# Чем выше значение, тем свободнее и менее предсказуемее ответы.
# Обычно используют значения от 0.7 до 1.0.
# Пример: 0.9
temperature = 0.9

# Сколько раз повторять запрос к Gemini при временной ошибке.
# Пример: 3
max_retries = 3

# Базовая пауза перед повтором запроса после ошибки, в секундах.
# Пример: 1.0
retry_backoff_seconds = 1.0

# Случайная добавка к паузе между ретраями, в секундах.
# Нужна, чтобы повторы не шли слишком однообразно.
# Пример: 0.3
retry_jitter_seconds = 0.3

# Максимальное время ожидания ответа от Gemini, в секундах.
# Пример: 45.0
request_timeout_seconds = 45.0

[logging]
# Уровень логирования приложения.
# Обычно используют DEBUG, INFO, WARNING, ERROR.
# Для обычного запуска достаточно INFO.
# Пример: "INFO"
level = "INFO"

[swarm]
# Включает swarm-режим.
# В текущем проекте обычно должно быть true.
# Пример: true
enabled = true

# Максимальное количество одновременно активных ботов в рамках runtime-ограничений.
# Сейчас параметр хранится в конфиге как общий лимит swarm.
# Пример: 20
max_parallel_bots = 20

# Если true, сообщения от других ботов swarm игнорируются в routed reply-логике.
# Это нужно, чтобы боты не отвечали друг другу как на сообщения обычных людей.
# Пример: true
ignore_messages_from_swarm = true

# Если true, бот отвечает только на те сообщения, которые являются reply именно на него.
# Это основной ожидаемый режим работы.
# Пример: true
reply_only_to_addressed_bot = true

[swarm.schedule]
# UTC-окна, в которые разрешены плановые обмены между ботами.
# Формат каждого окна: "HH-HH".
# Пример: ["10-11", "16-18"]
active_windows_utc = ["10-11", "16-18"]

# Диапазон минут для старта сообщения инициатора внутри выбранного окна.
# Формат: [минимум, максимум].
# Пример: [0, 30]
initiator_offset_minutes = [0, 30]

# Диапазон задержки ответа второго бота, в минутах.
# Формат: [минимум, максимум].
# Пример: [3, 10]
responder_delay_minutes = [3, 10]

# Максимальное число сообщений в одном exchange.
# Значение 2 означает классический сценарий: bot A пишет, bot B отвечает.
# Пример: 2
max_turns_per_exchange = 2

# Сколько последних пар ботов считать "на охлаждении", чтобы не повторять одну и ту же связку слишком часто.
# Пример: 1
pair_cooldown_slots = 1

[swarm.orchestrator]
# Как часто orchestrator проверяет, нужно ли запускать новый exchange, в секундах.
# Пример: 30
tick_seconds = 30

# Через сколько минут тишины можно считать группу неактивной для планового запуска.
# Пример: 60
silence_timeout_minutes = 60

# Если true, orchestrator пропускает scheduled exchange при недавней активности человека.
# Это снижает вероятность мешать живому общению.
# Пример: true
skip_if_recent_human_activity = true

[[swarm.bots]]
# Уникальный внутренний id бота внутри проекта.
# Используется в логах, БД и маршрутизации.
# Пример: "anna"
id = "anna"

# Имя переменной окружения из .env, где лежит SESSION_STRING этого аккаунта.
# Пример: "SESSION_STRING_ANNA"
session_env = "SESSION_STRING_ANNA"

# Имя persona-файла этого бота внутри папки bot_profiles_dir.
# Пример: "anna.md"
persona_file = "anna.md"

# Включён ли этот бот.
# Если false, бот останется в конфиге, но не будет запущен.
# Пример: true
enabled = true

# Индивидуальная температура генерации именно для этого бота.
# Можно использовать, чтобы один бот отвечал спокойнее, а другой свободнее.
# Пример: 0.9
temperature = 0.9

[[swarm.bots]]
# Второй бот настраивается так же, как и первый.
# Ниже просто ещё один пример записи.
id = "mike"
session_env = "SESSION_STRING_MIKE"
persona_file = "mike.md"
enabled = true
temperature = 0.8
